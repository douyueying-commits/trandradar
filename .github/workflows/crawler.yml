name: Get Hot News

on:
  schedule:
    # 每小时第 33 分钟运行一次（可按需修改）
    - cron: "33 * * * *"
  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Check expiration (7-day check-in)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW_FILE="crawler.yml"
          API_URL="repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs"

          TOTAL=$(gh api "$API_URL" --jq '.total_count')
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "No previous runs found, skipping expiration check"
            exit 0
          fi

          LAST_PAGE=$(( (TOTAL + 99) / 100 ))
          FIRST_RUN_DATE=$(gh api "$API_URL?per_page=100&page=$LAST_PAGE" --jq '.workflow_runs[-1].created_at')

          if [ -n "$FIRST_RUN_DATE" ]; then
            CURRENT_TIMESTAMP=$(date +%s)
            FIRST_RUN_TIMESTAMP=$(date -d "$FIRST_RUN_DATE" +%s)
            DIFF_SECONDS=$((CURRENT_TIMESTAMP - FIRST_RUN_TIMESTAMP))
            LIMIT_SECONDS=604800

            if [ $DIFF_SECONDS -gt $LIMIT_SECONDS ]; then
              echo "⚠️ Trial expired. Run 'Check In' to renew."
              gh workflow disable "$WORKFLOW_FILE"
              exit 1
            else
              DAYS_LEFT=$(( (LIMIT_SECONDS - DIFF_SECONDS) / 86400 ))
              echo "✅ Trial: ${DAYS_LEFT} day(s) left. Run 'Check In' before expiry."
            fi
          fi

      - name: Clone TrendRadar source
        if: success()
        run: |
          rm -rf upstream
          git clone --depth 1 https://github.com/sansan0/TrendRadar.git upstream

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: upstream/requirements.txt

      - name: Install dependencies
        if: success()
        run: |
          python -m pip install --upgrade pip
          pip install -r upstream/requirements.txt

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f upstream/config/config.yaml ]; then
            echo "Error: upstream/config/config.yaml missing"
            exit 1
          fi

          mkdir -p config
          if [ ! -f config/config.yaml ]; then
            cp upstream/config/config.yaml config/config.yaml
            echo "config/config.yaml was missing, copied default config"

              python -c 'from pathlib import Path; import yaml; p=Path("config/config.yaml"); cfg=yaml.safe_load(p.read_text(encoding="utf-8")) or {}; cfg.setdefault("rss", {})["enabled"]=False; cfg.setdefault("report", {})["display_mode"]="keyword"; d=cfg.setdefault("display", {}); r=d.setdefault("regions", {}); r["rss"]=False; r["standalone"]=False; r["ai_analysis"]=False; s=d.setdefault("standalone", {}); s["platforms"]=[]; s["rss_feeds"]=[]; s["max_items"]=0; ai=cfg.setdefault("ai_analysis", {}); ai["enabled"]=False; ai["include_standalone"]=False; p.write_text(yaml.safe_dump(cfg, allow_unicode=True, sort_keys=False), encoding="utf-8"); print("Applied focused-subscription defaults: RSS/standalone/AI-analysis disabled")'
          fi

          if [ ! -f config/frequency_words.txt ] && [ -f upstream/config/frequency_words.txt ]; then
            cp upstream/config/frequency_words.txt config/frequency_words.txt
          fi

          if [ ! -f config/ai_analysis_prompt.txt ] && [ -f upstream/config/ai_analysis_prompt.txt ]; then
            cp upstream/config/ai_analysis_prompt.txt config/ai_analysis_prompt.txt
          fi

          cp config/config.yaml upstream/config/config.yaml
          if [ -f config/frequency_words.txt ]; then
            cp config/frequency_words.txt upstream/config/frequency_words.txt
          fi
          if [ -f config/ai_analysis_prompt.txt ]; then
            cp config/ai_analysis_prompt.txt upstream/config/ai_analysis_prompt.txt
          fi

      - name: Run crawler
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}

          # AI 配置
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}

          # 远程存储配置（建议长期使用时配置）
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}

          GITHUB_ACTIONS: true
        working-directory: upstream
        run: python -m trendradar

      - name: Copy generated static page
        if: success()
        run: |
          if [ ! -f upstream/index.html ]; then
            echo "upstream/index.html not found"
            exit 1
          fi
          cp upstream/index.html index.html

      - name: Commit updated static page
        if: success()
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found, skip commit"
            exit 0
          fi

          if [ -z "$(git status --porcelain -- index.html)" ]; then
            echo "No index.html changes, skip commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "chore: update static report [skip ci]"

          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "$GITHUB_REF" ]; then
            BRANCH="${{ github.event.repository.default_branch }}"
          fi

          git push origin "HEAD:${BRANCH}"
